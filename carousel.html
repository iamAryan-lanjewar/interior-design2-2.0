<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Interior Designs | Instagram Carousel Posts</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .carousel-page {
            background-color: var(--clr-bg-light);
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .carousel-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: var(--clr-primary-dark);
            margin-bottom: 24px;
            transition: opacity 0.3s ease;
        }
        .back-link:hover {
            opacity: 0.7;
        }

        .insta-container {
            width: 100%;
            max-width: 600px;
            background: var(--clr-bg-white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            position: relative;
        }

        .insta-header {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .insta-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--clr-primary-dark);
            color: var(--clr-text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .insta-user-info {
            display: flex;
            flex-direction: column;
        }
        .insta-username {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--clr-text-main);
        }
        .insta-location {
            font-size: 0.8rem;
            color: var(--clr-text-muted);
        }

        .carousel-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0;
        }
        
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            border: none;
            z-index: 10;
            transition: background 0.3s ease;
        }
        .carousel-nav:hover {
            background: rgba(255,255,255,1);
        }
        .carousel-prev { left: 16px; }
        .carousel-next { right: 16px; }
        .carousel-nav i { font-size: 1.2rem; color: #333; }
        
        .carousel-nav.hidden { display: none; }

        .insta-actions {
            padding: 16px;
            display: flex;
            gap: 24px; /* Increased distance between icons */
        }
        .insta-actions i {
            font-size: 1.8rem;
            color: var(--clr-text-main);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s;
        }
        .insta-actions i:hover { opacity: 0.7; }
        
        /* Like animation */
        .ph-heart.liked {
            color: #ed4956;
            animation: like-pop 0.3s ease-in-out;
        }
        @keyframes like-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* Share animation */
        .ph-paper-plane-tilt.shared {
            animation: share-fly 0.4s ease-in-out;
        }
        @keyframes share-fly {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(6px, -6px) rotate(10deg) scale(1.1); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        }
        
        .insta-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 16px;
        }
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(0,0,0,0.2);
            transition: background-color 0.3s ease;
        }
        .dot.active {
            background-color: var(--clr-accent);
        }

        .insta-caption {
            padding: 0 16px 24px;
            font-size: 0.95rem;
        }
        .insta-caption strong { font-weight: 600; }
    </style>
</head>
<body>
    <div class="carousel-page">
        <div class="carousel-header">
            <a href="index.html" class="back-link">
                <i class="ph ph-arrow-left"></i> Back to Home
            </a>
            <h1 class="section-title">Design Guide</h1>
            <p>Pastel Aesthetic Minimalist Guide</p>
        </div>

        <div class="insta-container">
            <div class="insta-header">
                <div class="insta-avatar">UI</div>
                <div class="insta-user-info">
                    <span class="insta-username">unique.interiordesigns</span>
                    <span class="insta-location">Nagpur, India</span>
                </div>
            </div>

            <div class="carousel-wrapper">
                <div class="carousel-track" id="track">
                    <div class="carousel-slide"><img src="carousel_images/1.png" alt="Slide 1"></div>
                    <div class="carousel-slide"><img src="carousel_images/2.png" alt="Slide 2"></div>
                    <div class="carousel-slide"><img src="carousel_images/3.png" alt="Slide 3"></div>
                    <div class="carousel-slide"><img src="carousel_images/4.png" alt="Slide 4"></div>
                    <div class="carousel-slide"><img src="carousel_images/5.png" alt="Slide 5"></div>
                    <div class="carousel-slide"><img src="carousel_images/6.png" alt="Slide 6"></div>
                </div>
                
                <button class="carousel-nav carousel-prev hidden" id="btnPrev">
                    <i class="ph ph-caret-left"></i>
                </button>
                <button class="carousel-nav carousel-next" id="btnNext">
                    <i class="ph ph-caret-right"></i>
                </button>
            </div>

            <div class="insta-actions">
                <i class="ph ph-heart" id="likeBtn"></i>
                <i class="ph ph-paper-plane-tilt" id="shareBtn" title="Copy Website Link"></i>
            </div>
            
            <div class="insta-dots" id="dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="insta-caption">
                <strong>unique.interiordesigns</strong> Check out our latest minimalist guide! Precision, Style, Perfection. ✨
            </div>
        </div>
    </div>

    <script>
        const track = document.getElementById('track');
        const slides = Array.from(track.children);
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const dotsContainer = document.getElementById('dots');
        const dots = Array.from(dotsContainer.children);
        
        let currentIndex = 0;

        function updateCarousel() {
            // move track
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            
            // update buttons
            if (currentIndex === 0) {
                btnPrev.classList.add('hidden');
            } else {
                btnPrev.classList.remove('hidden');
            }
            
            if (currentIndex === slides.length - 1) {
                btnNext.classList.add('hidden');
            } else {
                btnNext.classList.remove('hidden');
            }
            
            // update dots
            dots.forEach(dot => dot.classList.remove('active'));
            dots[currentIndex].classList.add('active');
        }

        btnNext.addEventListener('click', () => {
            if (currentIndex < slides.length - 1) {
                currentIndex++;
                updateCarousel();
            }
        });

        btnPrev.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCarousel();
            }
        });
        
        // Add swipe support for mobile
        let touchstartX = 0;
        let touchendX = 0;
        
        track.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});
        
        track.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});
        
        function handleSwipe() {
            if (touchendX < touchstartX - 40) {
                // Swipe left -> next slide
                if (currentIndex < slides.length - 1) {
                    currentIndex++;
                    updateCarousel();
                }
            }
            if (touchendX > touchstartX + 40) {
                // Swipe right -> prev slide
                if (currentIndex > 0) {
                    currentIndex--;
                    updateCarousel();
                }
            }
        }
        
        const likeBtn = document.getElementById('likeBtn');
        if (likeBtn) {
            likeBtn.addEventListener('click', () => {
                likeBtn.classList.toggle('ph-fill');
                likeBtn.classList.toggle('liked');
            });
        }
        
        const shareBtn = document.getElementById('shareBtn');
        
        function fallbackCopyTextToClipboard(text) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                var successful = document.execCommand('copy');
                if (successful) {
                    alert("Website link copied to clipboard!");
                } else {
                    alert("Failed to copy link. (Try manually copying the URL)");
                }
            } catch (err) {
                alert("Failed to copy link. (Try manually copying the URL)");
            }
            document.body.removeChild(textArea);
        }

        if (shareBtn) {
            shareBtn.addEventListener('click', async () => {
                // Play animation
                shareBtn.classList.remove('shared');
                void shareBtn.offsetWidth; // trigger reflow
                shareBtn.classList.add('shared');
                
                const urlToShare = window.location.href;
                
                if (!navigator.clipboard) {
                    fallbackCopyTextToClipboard(urlToShare);
                    return;
                }
                try {
                    await navigator.clipboard.writeText(urlToShare);
                    alert("Website link copied to clipboard!");
                } catch (err) {
                    fallbackCopyTextToClipboard(urlToShare);
                }
            });
        }
    </script>
</body>
</html>
